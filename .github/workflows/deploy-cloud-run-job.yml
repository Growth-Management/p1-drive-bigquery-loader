name: Deploy Cloud Run Job

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT_ID: ice-qb
  GCP_REGION: asia-northeast1
  ARTIFACT_REGISTRY_REPOSITORY: p1-drive-bigquery-loader
  IMAGE_NAME: p1-drive-bigquery-loader
  CLOUD_RUN_JOB_NAME: p1-drive-bigquery-loader
  RUNTIME_SERVICE_ACCOUNT: p1-drive-bigquery-loader@ice-qb.iam.gserviceaccount.com
  JOB_CPU: "1"
  JOB_MEMORY: 2Gi
  JOB_TIMEOUT: 3600s
  JOB_MAX_RETRIES: "0"

jobs:
  deploy:
    name: Build and deploy Cloud Run Job
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Build image
        run: |
          IMAGE_URI="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REGISTRY_REPOSITORY}/${IMAGE_NAME}:${GITHUB_SHA}"
          docker build -t "${IMAGE_URI}" .
          echo "IMAGE_URI=${IMAGE_URI}" >> "${GITHUB_ENV}"

      - name: Push image
        run: docker push "${IMAGE_URI}"

      - name: Deploy Cloud Run Job
        run: |
          gcloud run jobs deploy "${CLOUD_RUN_JOB_NAME}" \
            --project "${GCP_PROJECT_ID}" \
            --region "${GCP_REGION}" \
            --image "${IMAGE_URI}" \
            --service-account "${RUNTIME_SERVICE_ACCOUNT}" \
            --cpu "${JOB_CPU}" \
            --memory "${JOB_MEMORY}" \
            --task-timeout "${JOB_TIMEOUT}" \
            --max-retries "${JOB_MAX_RETRIES}" \
            --args="--config,config/config.yaml,config/config.prod.yaml"

      - name: Verify Cloud Run Job
        run: |
          gcloud run jobs describe "${CLOUD_RUN_JOB_NAME}" \
            --project "${GCP_PROJECT_ID}" \
            --region "${GCP_REGION}" \
            --format "value(metadata.name,status.latestCreatedExecution.name)"
